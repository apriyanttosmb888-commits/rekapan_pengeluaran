<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Keuangan Pribadi</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,sans-serif;
}

body{
background:#0a0f1f;
color:white;
padding:20px;
}

h1{
text-align:center;
margin-bottom:20px;
color:#00f5ff;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.card{
background:#111827;
padding:20px;
border-radius:15px;
text-align:center;
box-shadow:0 0 15px rgba(0,245,255,.2);
}

.card h3{
margin-bottom:10px;
font-size:16px;
}

.value{
font-size:24px;
font-weight:bold;
}

.income{color:#00ff88;}
.expense{color:#ff4d6d;}
.balance{color:#00f5ff;}

.form-box{
background:#111827;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

input,select{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:8px;
background:#1f2937;
color:white;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#00f5ff;
cursor:pointer;
font-weight:bold;
}

table{
width:100%;
border-collapse:collapse;
background:#111827;
border-radius:15px;
overflow:hidden;
}

th{
background:#1f2937;
padding:12px;
}

td{
padding:12px;
text-align:center;
border-bottom:1px solid #222;
}

.delete-btn{
background:#ff4d6d;
padding:6px 10px;
color:white;
border:none;
cursor:pointer;
border-radius:5px;
}
</style>
</head>
<body>

<h1>💰 Dashboard Keuangan Pribadi</h1>

<div class="cards">

<div class="card">
<h3>Total Pemasukan</h3>
<div class="value income" id="totalIncome">Rp 0</div>
</div>

<div class="card">
<h3>Total Pengeluaran</h3>
<div class="value expense" id="totalExpense">Rp 0</div>
</div>

<div class="card">
<h3>Sisa Saldo</h3>
<div class="value balance" id="balance">Rp 0</div>
</div>

</div>

<div class="form-box">

<h2>Tambah Data</h2>

<input type="date" id="date">

<select id="type">
<option value="income">Gaji / Pemasukan</option>
<option value="expense">Pengeluaran</option>
</select>

<input type="text" id="desc" placeholder="Keterangan">

<input type="number" id="amount" placeholder="Nominal">

<button onclick="addTransaction()">Tambah</button>

</div>

<table>

<thead>
<tr>
<th>Tanggal</th>
<th>Jenis</th>
<th>Keterangan</th>
<th>Nominal</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="transactionTable"></tbody>

</table>

<script>

let transactions =
JSON.parse(localStorage.getItem("transactions")) || [];

function formatRupiah(number){
return "Rp " +
number.toLocaleString("id-ID");
}

function saveData(){
localStorage.setItem(
"transactions",
JSON.stringify(transactions)
);
}

function render(){

let income = 0;
let expense = 0;

const table =
document.getElementById("transactionTable");

table.innerHTML = "";

transactions.forEach((item,index)=>{

if(item.type==="income"){
income += item.amount;
}else{
expense += item.amount;
}

table.innerHTML += `
<tr>
<td>${item.date}</td>
<td>${item.type==="income" ? "Pemasukan" : "Pengeluaran"}</td>
<td>${item.desc}</td>
<td>${formatRupiah(item.amount)}</td>
<td>
<button class="delete-btn"
onclick="deleteTransaction(${index})">
Hapus
</button>
</td>
</tr>
`;

});

document.getElementById("totalIncome").innerText =
formatRupiah(income);

document.getElementById("totalExpense").innerText =
formatRupiah(expense);

document.getElementById("balance").innerText =
formatRupiah(income-expense);

}

function addTransaction(){

const date =
document.getElementById("date").value;

const type =
document.getElementById("type").value;

const desc =
document.getElementById("desc").value;

const amount =
parseInt(document.getElementById("amount").value);

if(!date || !desc || !amount){
alert("Lengkapi data");
return;
}

transactions.push({
date,
type,
desc,
amount
});

saveData();
render();

document.getElementById("desc").value="";
document.getElementById("amount").value="";
}

function deleteTransaction(index){

if(confirm("Hapus data?")){

transactions.splice(index,1);

saveData();
render();

}

}

render();

</script>

</body>
</html>
